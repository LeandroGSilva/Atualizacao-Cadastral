<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atualização Cadastral — WFLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --cream: #F5F4F2;
    --dark: #1A1A1A;
    --gold: #CC4E28;
    --gold-light: #F2C4B2;
    --green: #CC4E28;
    --green-light: #E8724F;
    --red: #A83218;
    --gray: #6B6B6B;
    --border: #E2DFDB;
    --white: #FFFFFF;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --wflow-dark: #1A1A1A;
    --wflow-gold: #CC4E28;
    --wflow-orange: #CC4E28;
    --wflow-orange-light: #F2C4B2;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* TOP BAR — header + progress unidos em um bloco */
  .top-bar {
    background: var(--dark);
    width: 100%;
  }

  /* HEADER */
  .header {
    padding: 28px 40px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .header-sub {
    color: rgba(255,255,255,0.45);
    font-size: 0.78rem;
    margin-top: 2px;
    font-weight: 300;
  }

  /* PROGRESS */
  .progress-bar-wrapper {
    background: var(--dark);
    width: 100%;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    padding: 12px 24px 24px;
    display: flex;
    align-items: center;
    max-width: 360px;
    margin: 0 auto;
  }
  .step-item {
    display: flex;
    align-items: center;
    flex: 1;
  }
  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    transition: all 0.4s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .step-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
  }
  .step-dot.done {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .step-dot.done::after {
    content: '✓';
    font-size: 0.75rem;
  }
  .step-dot.done span { display: none; }
  .step-line {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.35);
    margin: 0 4px;
    transition: background 0.4s ease;
  }
  .step-line.done { background: var(--gold); }
  .step-label {
    display: none;
  }

  /* MAIN */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--white);
    border-radius: 16px;
    padding: 40px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-light);
    color: #7A5C1E;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .section-desc {
    color: var(--gray);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 32px;
    border-left: 3px solid var(--gold);
    padding-left: 14px;
  }

  /* FORM ELEMENTS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field.span2 { grid-column: span 2; }
  .field.span3 { grid-column: span 3; }

  label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  label .req { color: var(--gold); margin-left: 2px; }
  label .hint {
    font-weight: 400;
    text-transform: none;
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0;
    display: block;
    margin-top: 1px;
  }

  input[type="text"], input[type="email"], input[type="tel"],
  input[type="date"], input[type="month"], input[type="number"], select, textarea {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
    text-align: left;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="date"]::-webkit-date-and-time-value {
    text-align: left;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    background: white;
  }
  textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  select { cursor: pointer; }

  /* RADIO / CHECKBOX GROUPS */
  .radio-group, .check-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 2px;
  }
  .radio-group.horizontal {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
  }
  .radio-opt, .check-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.88rem;
    background: var(--cream);
    user-select: none;
  }
  .radio-opt:hover, .check-opt:hover {
    border-color: var(--gold);
    background: #FDF8F0;
  }
  .radio-opt input, .check-opt input { display: none; }
  .radio-opt.selected, .check-opt.selected {
    border-color: var(--gold);
    background: #FDF8F0;
    color: #7A5C1E;
    font-weight: 500;
  }
  .radio-indicator {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .radio-opt.selected .radio-indicator {
    border-color: var(--gold);
    background: var(--gold);
  }
  .radio-opt.selected .radio-indicator::after {
    content: '';
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    display: block;
  }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1.5px solid var(--border);
    margin: 28px 0;
  }

  /* REPEATABLE ITEMS */
  .repeat-container { display: flex; flex-direction: column; gap: 16px; }
  .repeat-item {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
  }
  .repeat-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .repeat-item-title {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--gray);
  }
  .remove-btn {
    background: none;
    border: 1.5px solid #FFCCD5;
    color: var(--red);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .remove-btn:hover { background: #FFECEE; }
  .add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--gold-light);
    border-radius: 12px;
    background: none;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .add-btn:hover {
    border-color: var(--gold);
    background: #FDF8F0;
  }

  /* NAVIGATION */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    gap: 12px;
  }
  .btn-back {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--dark); color: var(--dark); }
  .btn-next {
    background: var(--dark);
    color: var(--gold);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: #333333; transform: translateY(-1px); }
  .btn-submit {
    background: #CC4E28;
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-submit:hover { background: #A83A1A; transform: translateY(-1px); }

  /* STEP COUNT */
  .step-counter {
    font-size: 0.78rem;
    color: var(--gray);
    white-space: nowrap;
  }

  /* SUCCESS */
  .success-card {
    text-align: center;
    padding: 60px 40px;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: #CC4E28;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2rem;
  }
  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 12px;
  }
  .success-desc {
    color: var(--gray);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  /* MONEY INPUT */
  .money-wrap { position: relative; }
  .money-prefix {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--gray);
    font-weight: 600;
    pointer-events: none;
  }
  .money-wrap input { padding-left: 36px; }

  /* PERCENT INPUT */
  .pct-wrap { position: relative; }
  .pct-suffix {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--gray);
    font-weight: 600;
    pointer-events: none;
  }
  .pct-wrap input { padding-right: 36px; }

  /* INFO BOX */
  .info-box {
    background: #EFF8F4;
    border: 1.5px solid #B7DFD0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    color: #2D6A4F;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .info-box strong { font-weight: 600; }

  @media (max-width: 600px) {
    .header { padding: 20px; }
    .progress-bar { padding: 0 20px 20px; }
    .main { padding: 24px 16px 60px; }
    .section-card { padding: 24px 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.thirds { grid-template-columns: 1fr; }
    .field.span2, .field.span3 { grid-column: span 1; }
    .section-title { font-size: 1.4rem; }
    .welcome-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>

      </div>

        <div class="header-title">WFLOW</div>
      </div>

<div class="main">
  <div id="formContainer"></div>
</div>

<script>
const STEPS = [
  { label: 'Dados', icon: '1' },
  { label: 'Objetivos', icon: '2' },
  { label: 'Renda', icon: '3' },
  { label: 'Patrimônio', icon: '4' },
];

let currentStep = 0;
let formData = {};
let showingWelcome = true;

function renderWelcome() {
  document.getElementById('progressBar').parentElement.style.display = 'none';
  return `
    <div class="section-card" style="padding:0;overflow:hidden;">
      <!-- Hero banner -->
      <div style="background:var(--wflow-dark);padding:48px 40px 40px;text-align:center;position:relative;">
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(200,168,75,0.08) 0%,transparent 60%);pointer-events:none;"></div>
        <h1 style="font-family:'Playfair Display',serif;color:#FFFFFF;font-size:1.9rem;font-weight:700;line-height:1.25;margin-bottom:12px;">
          Atualização Cadastral
        </h1>
      </div>

      <!-- Conteúdo -->
      <div style="padding:40px;">
        <p style="font-size:1.05rem;color:var(--dark);line-height:1.75;margin-bottom:24px;">
          Olá! Seja bem-vindo(a) à sua <strong>Atualização Cadastral WFLOW.</strong>
        </p>

        <p style="font-size:0.95rem;color:var(--dark);line-height:1.7;margin-bottom:24px;">
          Para seguirmos próximos e oferecer um atendimento cada vez mais alinhado ao seu momento de vida, pedimos alguns minutos para confirmar e atualizar seus dados conosco — informações pessoais, familiares, patrimoniais e seus objetivos atuais.
        </p>

        <div style="background:#F8F6F0;border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:20px 22px;margin-bottom:24px;">
          <p style="font-size:0.95rem;color:var(--dark);line-height:1.7;">
            Com seus dados atualizados, seu assessor poderá te acompanhar com mais precisão e, se fizer sentido, propor uma conversa para revisar sua <strong>estratégia financeira</strong>.
          </p>
        </div>

        <p style="font-size:0.95rem;color:var(--dark);line-height:1.7;margin-bottom:24px;">
          Não se preocupe em ter todos os números exatos em mãos — estimativas são bem-vindas. O importante é manter seu cadastro o mais atualizado possível.
        </p>

        <!-- Destaques -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;" class="welcome-grid">
          ${[
            ['🔒','Sigilo Total','Suas informações são tratadas com absoluta confidencialidade.'],
            ['⚡','Cadastro Simplificado','Processo rápido e direto, pensado para o seu dia a dia.'],
            ['📊','Dados Sempre Atualizados','Suas informações mantêm seu atendimento sempre em dia.'],
            ['🤝','Acompanhamento','Seu assessor está à disposição para o que precisar.'],
          ].map(([icon,title,desc]) => `
            <div style="background:#F8F6F0;border:1.5px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:6px;">
              <div style="font-size:1.3rem;">${icon}</div>
              <div style="font-size:0.8rem;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:0.03em;line-height:1.3;">${title}</div>
              <div style="font-size:0.79rem;color:var(--gray);line-height:1.5;">${desc}</div>
            </div>`).join('')}
        </div>

        <p style="font-size:0.82rem;color:var(--gray);margin-bottom:20px;line-height:1.6;">
          Leva poucos minutos e está dividido em etapas simples: <strong>dados pessoais, objetivos, rendas e despesas, e patrimônio.</strong>
        </p>

        <!-- LGPD -->
        <div style="background:#F0F4FF;border:1.5px solid #C5D0F0;border-radius:12px;padding:16px 18px;margin-bottom:28px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="font-size:1.1rem;">🔐</span>
            <span style="font-size:0.8rem;font-weight:700;color:#2A3A6B;text-transform:uppercase;letter-spacing:0.04em;">Privacidade & LGPD</span>
          </div>
          <p style="font-size:0.8rem;color:#3A4A7A;line-height:1.6;margin:0;">
            Suas informações são coletadas exclusivamente para fins de <strong>atualização cadastral e aprimoramento do seu atendimento</strong>, em conformidade com a <strong>Lei Geral de Proteção de Dados (Lei nº 13.709/2018 — LGPD)</strong>. Os dados fornecidos serão tratados com sigilo absoluto, não serão compartilhados com terceiros sem seu consentimento.
          </p>
        </div>

        <button class="btn-next" onclick="startForm()" style="width:100%;justify-content:center;font-size:1rem;padding:16px;">
          Começar atualização →
        </button>
      </div>
    </div>`;
}

function startForm() {
  showingWelcome = false;
  document.getElementById('progressBar').parentElement.style.display = 'block';
  rerenderSection();
}

// ---- Render progress ----
function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = STEPS.map((s, i) => {
    let cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    let line = i < STEPS.length - 1 ? `<div class="step-line ${i < currentStep ? 'done' : ''}"></div>` : '';
    return `
      <div class="step-item">
        <div class="step-dot ${cls}">
          <span>${s.icon}</span>
        </div>
        ${line}
      </div>`;
  }).join('');
}

// ---- Nav Buttons ----
function navButtons(isLast = false) {
  const total = STEPS.length;
  return `
    <div class="nav-buttons">
      <div>
        ${currentStep > 0 ? `<button class="btn-back" onclick="prevStep()">← Voltar</button>` : '<span></span>'}
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="step-counter">${currentStep + 1} de ${total}</span>
        ${isLast
          ? `<button class="btn-submit" onclick="submitForm()">✓ Enviar Mapeamento</button>`
          : `<button class="btn-next" onclick="nextStep()">Continuar →</button>`}
      </div>
    </div>`;
}

// ---- STEP 1: Dados Pessoais ----
function renderStep0() {
  return `
    <div class="section-card">
      <div class="section-badge">📋 Etapa 1 de 4</div>
      <h2 class="section-title">Dados Pessoais</h2>
      <p class="section-desc">Informações básicas para identificação e contato. Todas as informações são tratadas com total confidencialidade.</p>

      <div class="form-grid">
        <div class="field span2">
          <label>Nome completo <span class="req">*</span></label>
          <input type="text" id="nome" placeholder="Seu nome completo" value="${formData.nome||''}">
        </div>
        <div class="field">
          <label>Celular <span class="req">*</span></label>
          <input type="tel" id="celular" placeholder="(11) 99999-9999" value="${formData.celular||''}" oninput="maskPhone(this)">
        </div>
        <div class="field">
          <label>E-mail <span class="req">*</span></label>
          <input type="email" id="email" placeholder="seu@email.com" value="${formData.email||''}">
        </div>
        <div class="field span2">
          <label>Profissão</label>
          <input type="text" id="profissao" placeholder="Ex: Empresário, Médico, Engenheiro..." value="${formData.profissao||''}">
        </div>
      </div>

      <hr class="divider">

      <div class="form-grid">
        <div class="field">
          <label>Dupla cidadania? <span class="req">*</span></label>
          <div class="radio-group horizontal">
            ${['Sim','Não'].map(opt => `<label class="radio-opt ${formData.duplaCidadania===opt?'selected':''}" onclick="selectRadio('duplaCidadania','${opt}',this)" style="flex:1">
              <input type="radio" name="duplaCidadania" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Realizou/realizará saída fiscal? <span class="req">*</span></label>
          <div class="radio-group horizontal">
            ${['Sim','Não'].map(opt => `<label class="radio-opt ${formData.saidaFiscal===opt?'selected':''}" onclick="selectRadio('saidaFiscal','${opt}',this)" style="flex:1">
              <input type="radio" name="saidaFiscal" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Esporte de interesse</label>
          <input type="text" id="esporte" placeholder="Ex: Tênis, Futebol, Golf..." value="${formData.esporte||''}">
        </div>
        <div class="field">
          <label>Hobby de interesse</label>
          <input type="text" id="hobby" placeholder="Ex: Viagens, Leitura, Culinária..." value="${formData.hobby||''}">
        </div>
      </div>

      ${navButtons(false)}
    </div>`;
}

// ---- STEP 2: Objetivos (pulou Familiar) ----
function renderStep1() {
  if (!formData.familiares) formData.familiares = [];
  return `
    <div class="section-card">
      <div class="section-badge">👨‍👩‍👧 Etapa 2 de 4</div>
      <h2 class="section-title">Estrutura Familiar</h2>
      <p class="section-desc">Informe os membros da família que participam ou impactam diretamente seu orçamento — cônjuge, filhos, pais ou outros dependentes financeiros. Não inclua você mesmo.</p>

      <div class="repeat-container" id="familiaresContainer">
        ${formData.familiares.map((f,i) => renderFamiliar(i,f)).join('')}
      </div>
      <button class="add-btn" onclick="addFamiliar()">+ Adicionar membro da família</button>

      ${navButtons(false)}
    </div>`;
}

function renderFamiliar(i, f={}) {
  const parentescos = ['Cônjuge','Filho(a)','Pai','Mãe','Irmão(ã)','Avô(ó)','Primo(a)','Amigo(a)','Outro'];
  return `
    <div class="repeat-item" id="familiar-${i}">
      <div class="repeat-item-header">
        <span class="repeat-item-title">Membro ${i+1}</span>
        <button class="remove-btn" onclick="removeFamiliar(${i})">Remover</button>
      </div>
      <div class="form-grid">
        <div class="field span2">
          <label>Nome completo</label>
          <input type="text" placeholder="Nome do membro" value="${f.nome||''}" onchange="updateFamiliar(${i},'nome',this.value)">
        </div>
        <div class="field">
          <label>Grau de parentesco</label>
          <select onchange="updateFamiliar(${i},'parentesco',this.value)">
            <option value="">Selecione...</option>
            ${parentescos.map(p => `<option value="${p}" ${f.parentesco===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Data de nascimento</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1fr;gap:8px;">
            <input type="number" placeholder="Dia" min="1" max="31" value="${f.nascDia||''}" onchange="updateFamiliar(${i},'nascDia',this.value);updateFamiliarNasc(${i})" inputmode="numeric" pattern="[0-9]*" autocorrect="off" autocapitalize="off" style="text-align:center;">
            <select onchange="updateFamiliar(${i},'nascMes',this.value);updateFamiliarNasc(${i})">
              <option value="">Mês</option>
              ${['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
                .map((m,idx) => `<option value="${String(idx+1).padStart(2,'0')}" ${f.nascMes===String(idx+1).padStart(2,'0')?'selected':''}>${m}</option>`).join('')}
            </select>
            <input type="number" placeholder="Ano" min="1900" max="2024" value="${f.nascAno||''}" onchange="updateFamiliar(${i},'nascAno',this.value);updateFamiliarNasc(${i})" inputmode="numeric" pattern="[0-9]*" autocorrect="off" autocapitalize="off" style="text-align:center;">
          </div>
        </div>
        <div class="field span2">
          <label>Dependente para Imposto de Renda?</label>

// ---- Masks ----
function maskCPF(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2');
  v = v.replace(/(\d{3})(\d)/,'$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  el.value = v;
}
function maskPhone(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  v = v.replace(/^(\d{2})(\d)/,'($1) $2');
  v = v.replace(/(\d{5})(\d)/,'$1-$2');
  el.value = v;
}

// ---- Navigation ----
function saveCurrentStep() {
  if(currentStep===0) collectStep0();
  if(currentStep===1) collectStep1();
  const idadeEl = document.getElementById('idadeAposent');
  const rendaEl = document.getElementById('rendaAposent');
  const expectEl = document.getElementById('expectativa');
  if(idadeEl && idadeEl.value) formData.idadeAposent = idadeEl.value;
  if(rendaEl && rendaEl.value) formData.rendaAposent = rendaEl.value;
  if(expectEl && expectEl.value) formData.expectativa = expectEl.value;
}

function nextStep() {
  saveCurrentStep();
  if(currentStep < STEPS.length - 1) {
    currentStep++;
    rerenderSection();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function prevStep() {
  saveCurrentStep();
  if(currentStep > 0) {
    currentStep--;
    rerenderSection();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function rerenderSection() {
  renderProgress();
  const container = document.getElementById('formContainer');
  const renders = [renderStep0, renderStep2, renderStep3, renderStep4];
  container.innerHTML = renders[currentStep]();
}

function formatMoney(v) {
  if(!v) return 'Não informado';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
}

function submitForm() {
  saveCurrentStep();

  const d = formData;
  let msg = '';

  msg += '*ATUALIZACAO CADASTRAL*\n';
  msg += '========================\n\n';

  msg += '*DADOS PESSOAIS*\n';
  msg += `• Nome: ${d.nome||'—'}\n`;
  msg += `• Celular: ${d.celular||'—'}\n`;
  msg += `• E-mail: ${d.email||'—'}\n`;
  msg += `• Profissão: ${d.profissao||'—'}\n`;
  msg += `• Dupla cidadania: ${d.duplaCidadania||'—'}\n`;
  msg += `• Saída fiscal: ${d.saidaFiscal||'—'}\n`;
  msg += `• Esporte: ${d.esporte||'—'}\n`;
  msg += `• Hobby: ${d.hobby||'—'}\n\n`;

  msg += '*OBJETIVOS*\n';
  msg += `• Aposentadoria aos: ${d.idadeAposent||'—'} anos\n`;
  msg += `• Renda desejada: ${formatMoney(d.rendaAposent)}/mes\n`;
  msg += `• Expectativa de vida: ${d.expectativa||'—'} anos\n`;
  if(d.objetivos && d.objetivos.length > 0) {
    msg += `• Objetivos secundarios:\n`;
    d.objetivos.forEach((o,i) => {
      msg += `  ${i+1}. ${o.nome||'—'} | Idade: ${o.idade||'—'} | ${o.frequencia||'—'}`;
      if(o.frequencia==='Parcelado') msg += ` | Parcela: ${formatMoney(o.valorParcela)} x ${o.anos||'—'} anos`;
      else if(o.valorTotal) msg += ` | Total: ${formatMoney(o.valorTotal)}`;
      msg += '\n';
    });
  }
  msg += '\n';

  msg += '*RENDAS & DESPESAS*\n';
  msg += `• Renda mensal liquida: ${formatMoney(d.rendaTotal)}\n`;
  msg += `• Despesa mensal total: ${formatMoney(d.despesaTotal)}\n`;
  msg += '\n';

  msg += '*BENS & PATRIMONIO*\n';
  msg += `• Investimentos Nacionais: ${formatMoney(d.invNacTotal)}\n`;
  msg += `• Investimentos Globais: US$ ${d.invGlobTotal||'—'}\n`;
  msg += `• Imoveis: ${formatMoney(d.imoveisTotal)}\n`;

  msg += '\n========================\n';
  msg += 'Atualizacao cadastral concluida.';

  const urlParams = new URLSearchParams(window.location.search);
  const assessorNome = urlParams.get('nome') ? decodeURIComponent(urlParams.get('nome')) : 'Assessor';
  const assessorEmail = urlParams.get('email') ? decodeURIComponent(urlParams.get('email')) : 'leandro_wrx@hotmail.com';

  // Mostrar tela de envio
  document.getElementById('formContainer').innerHTML = `
    <div class="section-card success-card">
      <div class="success-icon" id="successIcon" style="background:#888;font-size:1.4rem;">⏳</div>
      <h2 class="success-title">Enviando...</h2>
      <p class="success-desc" id="successMsg">Aguarde enquanto enviamos seu mapeamento.</p>
    </div>`;
  document.getElementById('progressBar').innerHTML = '';
  document.getElementById('progressBar').parentElement.style.display = 'none';

  // Enviar por e-mail via EmailJS
  emailjs.send('service_yqi14o7', 'template_ts8pt1n', {
    assessor_email: assessorEmail,
    assessor_nome: assessorNome,
    cliente_nome: d.nome || 'Cliente',
    mapeamento: msg.replace(/\*/g, '').replace(/========================/g, '─────────────────────')
  }).then(() => {
    document.getElementById('successIcon').style.background = '#CC4E28';
    document.getElementById('successIcon').textContent = '✓';
    document.querySelector('.success-title').textContent = 'Cadastro atualizado!';
    document.getElementById('successMsg').innerHTML = `Suas informações foram atualizadas com sucesso para <strong>${assessorNome}</strong>.<br><br>Em breve você receberá um retorno. 😊`;
  }).catch(() => {
    document.getElementById('successIcon').style.background = '#C1121F';
    document.getElementById('successIcon').textContent = '!';
    document.querySelector('.success-title').textContent = 'Erro ao enviar';
    document.getElementById('successMsg').innerHTML = `Ocorreu um problema ao enviar seu mapeamento. Por favor, entre em contato diretamente com seu assessor.`;
  });
}
